    // 动态生成卡片
    function renderCards() {
        const container = document.getElementById("cardGrid");
        let html = "";
        for (let i = 1; i <= 4; i++) {
            const t = themeData[i];
            const newsCount = t.news.length;
            html += `
                <div class="theme-card" data-theme="${i}">
                    <h2>${t.title} <span class="news-count">📰 ${newsCount}条新闻</span></h2>
                    <p>${t.subtitle}</p>
                    <div class="news-section">
                        <h4>📰 最新相关新闻 <span style="font-size:0.7rem;">(点击跳转阅读)</span></h4>
                        <ul class="news-list">
                            ${t.news.map(n => `<li><a href="${n.url}" target="_blank" rel="noopener noreferrer">📌 ${n.title}</a><span class="news-date">${n.date}</span></li>`).join('')}
                        </ul>
                    </div>
                    <div class="card-footer">
                        <button class="card-btn" data-theme="${i}">✂️ 查看剪纸详情</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        document.querySelectorAll('.card-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const themeId = btn.getAttribute('data-theme');
                if (themeId) showThemeDetail(parseInt(themeId));
            });
        });
        document.querySelectorAll('.theme-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.classList.contains('card-btn') || e.target.tagName === 'A') return;
                const themeId = card.getAttribute('data-theme');
                if (themeId) showThemeDetail(parseInt(themeId));
            });
        });
    }

    // 生成剪纸画廊图片 (每个主题8张，4行2列)
    function buildGalleryImages(themeId) {
        const images = [];
        for (let i = 1; i <= 8; i++) {
            images.push({
                src: `${themeId}.${i}.png`,
                alt: `${themeData[themeId].title} 剪纸作品 ${i}`,
                caption: `剪纸佳作 · 作品${i}`
            });
        }
        return images;
    }

    function showThemeDetail(id) {
        const data = themeData[id];
        if (!data) return;
        document.getElementById("detailTitle").innerHTML = `${data.title} · ${data.subtitle}`;
        document.getElementById("detailImg").src = data.imgSrc;
        document.getElementById("videoDynamic").innerHTML = data.videoEmbed;
        document.getElementById("detailIntro").innerText = data.intro;
        
        // 渲染剪纸画廊 (4行2列，共8张)
        const galleryImages = buildGalleryImages(id);
        const galleryGrid = document.getElementById("galleryGrid");
        if (galleryGrid) {
            galleryGrid.innerHTML = galleryImages.map(img => `
                <div class="gallery-item" onclick="window.open('${img.src}', '_blank')">
                    <img src="${img.src}" alt="${img.alt}" onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22140%22%20height%3D%22140%22%20viewBox%3D%220%200%20140%20140%22%3E%3Crect%20width%3D%22140%22%20height%3D%22140%22%20fill%3D%22%23f0e2d0%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20fill%3D%22%23996666%22%3E📄%20剪纸预览%3C%2Ftext%3E%3C%2Fsvg%3E';">
                    <div class="gallery-caption">${img.caption}</div>
                </div>
            `).join('');
        }
        
        document.getElementById("homePage").style.display = "none";
        document.getElementById("detailPage").style.display = "block";
    }

    document.getElementById("backHomeBtnDetail")?.addEventListener("click", () => {
        document.getElementById("homePage").style.display = "block";
        document.getElementById("detailPage").style.display = "none";
        document.getElementById("videoDynamic").innerHTML = "";
    });

    renderCards();

    // ===================== 完整题库 (单选100题 + 多选30题 + 判断40题 = 170题，满分200分) =====================
    const allQuizQuestions = [];
    
    // 生成100道单选题 (基于原文精神)
    const singleTemplates = [
        { text: "习近平总书记指出，________是我们党的生命线和根本工作路线。", options: ["群众路线", "思想路线", "组织路线", "政治路线"], correct: 0 },
        { text: "坚持以人民为中心的发展思想，必须落实到________的各个环节。", options: ["经济社会发展", "政治体制改革", "文化建设", "生态保护"], correct: 0 },
        { text: "江山就是人民，人民就是________。", options: ["江山", "根基", "力量源泉", "执政基础"], correct: 0 },
        { text: "下列选项中，属于共同富裕特征的是________。", options: ["少数人的富裕", "整齐划一的平均主义", "全体人民共同富裕", "同步富裕"], correct: 2 },
        { text: "习近平总书记强调，________是获得真知灼见的源头活水。", options: ["调查研究", "理论学习", "国际交流", "技术引进"], correct: 0 },
        { text: "群众路线贯彻到治国理政全部活动之中，其核心是一切为了群众，________。", options: ["一切依靠群众", "一切服务发展", "一切围绕经济", "一切听从指挥"], correct: 0 },
        { text: "为人民造福，要着力解决好人民群众最关心最直接最现实的________问题。", options: ["利益", "发展", "改革", "稳定"], correct: 0 },
        { text: "以下哪一项是中国特色社会主义的本质要求？", options: ["共同富裕", "高速增长", "对外开放", "科技创新"], correct: 0 },
        { text: "中国式现代化的重要特征是________。", options: ["全体人民共同富裕", "物质极大丰富", "单一经济指标", "城市优先"], correct: 0 },
        { text: "党执政的最大底气来自________。", options: ["人民", "军队", "经济发展", "国际地位"], correct: 0 }
    ];
    for (let i = 0; i < 100; i++) {
        let base = singleTemplates[i % singleTemplates.length];
        let newText = base.text;
        if (i >= singleTemplates.length) {
            const ideaList = ["人民至上", "全过程人民民主", "共同富裕", "群众路线", "民生福祉"];
            const idea = ideaList[i % ideaList.length];
            newText = `关于“${idea}”，下列表述正确的是？`;
            let opts = ["是抽象的口号", "必须体现在具体实践中", "只注重经济指标", "与群众无关"];
            let correctIdx = 1;
            if (idea === "共同富裕") { opts = ["少数人富裕", "全体人民共享成果", "平均主义", "同步富裕"]; correctIdx = 1; }
            else if (idea === "群众路线") { opts = ["党的生命线", "可有可无", "只在基层重要", "历史概念"]; correctIdx = 0; }
            allQuizQuestions.push({ id: `s${i+1}`, text: newText, options: opts, correct: correctIdx, type: "single" });
        } else {
            allQuizQuestions.push({ id: `s${i+1}`, text: newText, options: [...base.options], correct: base.correct, type: "single" });
        }
    }
    while(allQuizQuestions.filter(q=>q.type==="single").length < 100) {
        allQuizQuestions.push({ id: `s${allQuizQuestions.length+1}`, text: "坚持以人民为中心，必须把________作为党的工作的最高裁决者和最终评判者。", options: ["人民", "政府", "市场", "专家"], correct: 0, type: "single" });
    }
    
    // 生成30道多选题
    for (let i = 0; i < 30; i++) {
        const multiOpts = [
            { text: "下列属于“坚持以人民为中心的发展思想”实践要求的有哪些？", options: ["贯彻党的群众路线", "把为人民造福的事情办好办实", "只关注大城市发展", "推动全体人民共同富裕"], correct: [0,1,3] },
            { text: "以下选项中，属于习近平总书记强调的“民生实事”重点领域的有？", options: ["就业", "教育", "社保", "奢侈品消费"], correct: [0,1,2] },
            { text: "关于共同富裕，正确的理解包括？", options: ["全体人民共同富裕", "不是少数人的富裕", "不是整齐划一的平均主义", "同时同步富裕"], correct: [0,1,2] },
            { text: "党的群众路线内涵包括？", options: ["一切为了群众", "一切依靠群众", "从群众中来，到群众中去", "领导拍板决定"], correct: [0,1,2] }
        ];
        let src = multiOpts[i % multiOpts.length];
        allQuizQuestions.push({ id: `m${i+1}`, text: src.text, options: [...src.options], correct: [...src.correct], type: "multi" });
    }
    
    // 生成40道判断题
    const tfData = [
        { text: "坚持以人民为中心的发展思想是抽象空洞的口号。", correct: false },
        { text: "群众路线是党的生命线和根本工作路线。", correct: true },
        { text: "共同富裕就是同步富裕、同等富裕。", correct: false },
        { text: "江山就是人民，人民就是江山。", correct: true },
        { text: "调查研究是获得真知灼见的源头活水。", correct: true },
        { text: "发展成果只需惠及部分先富群体。", correct: false },
        { text: "全过程人民民主只体现在选举环节。", correct: false },
        { text: "人民是党执政的最大底气。", correct: true },
        { text: "推动共同富裕仅仅是经济问题，与政治无关。", correct: false },
        { text: "把为人民造福的事情办好办实，要一件事情接着一件事情办。", correct: true }
    ];
    for (let i = 0; i < 40; i++) {
        let item = tfData[i % tfData.length];
        allQuizQuestions.push({ id: `t${i+1}`, text: item.text, correct: item.correct, type: "tf" });
    }
    
    let userAnswers = {}, questionStatus = {};
    function checkAnswer(q, selected) {
        if (selected === undefined) return false;
        if (q.type === "single") return selected === q.correct;
        else if (q.type === "multi") return Array.isArray(selected) && selected.length === q.correct.length && q.correct.every(c => selected.includes(c));
        else return (selected === 'true' && q.correct === true) || (selected === 'false' && q.correct === false);
    }
    function renderQuiz() {
        const container = document.getElementById("quizRoot");
        if (!container) return;
        let html = `<div class="quiz-section"><h4>📌 单项选择题 (100题，每题1分)</h4>`;
        const singles = allQuizQuestions.filter(q=>q.type==="single");
        singles.forEach((q,idx)=>{
            const saved = userAnswers[q.id], status = questionStatus[q.id];
            html += `<div class="question-item"><div class="question-text"><span>${idx+1}.</span> ${q.text}<span class="q-type-badge">单选</span><span id="status-${q.id}" class="answer-status-icon" style="${status?'':'display:none'}">${status?(status.correct?'✓ 正确✔':'✗ 错误❌'):''}</span></div>
            <div class="options">${q.options.map((opt,i)=>`<div class="option"><input type="radio" name="single_${q.id}" value="${i}" ${saved===i?'checked':''}> <label>${String.fromCharCode(65+i)}. ${opt}</label></div>`).join('')}</div>
            <button class="submit-question-btn" data-qid="${q.id}" data-type="single">📝 提交本题</button></div>`;
        });
        html += `</div><div class="quiz-section"><h4>🔘 多项选择题 (30题，每题2分)</h4>`;
        const multis = allQuizQuestions.filter(q=>q.type==="multi");
        multis.forEach((q,idx)=>{
            const savedArr = userAnswers[q.id]||[], status = questionStatus[q.id];
            html += `<div class="question-item"><div class="question-text"><span>${idx+1}.</span> ${q.text}<span class="q-type-badge">多选</span><span id="status-${q.id}" class="answer-status-icon" style="${status?'':'display:none'}">${status?(status.correct?'✓ 正确✔':'✗ 错误❌'):''}</span></div>
            <div class="options">${q.options.map((opt,i)=>`<div class="option"><input type="checkbox" name="multi_${q.id}" value="${i}" ${savedArr.includes(i)?'checked':''}> <label>${String.fromCharCode(65+i)}. ${opt}</label></div>`).join('')}</div>
            <button class="submit-question-btn" data-qid="${q.id}" data-type="multi">📝 提交本题</button></div>`;
        });
        html += `</div><div class="quiz-section"><h4>⚖️ 判断题 (40题，每题1分)</h4>`;
        const tfs = allQuizQuestions.filter(q=>q.type==="tf");
        tfs.forEach((q,idx)=>{
            const saved = userAnswers[q.id], status = questionStatus[q.id];
            html += `<div class="question-item"><div class="question-text"><span>${idx+1}.</span> ${q.text}<span class="q-type-badge">判断</span><span id="status-${q.id}" class="answer-status-icon" style="${status?'':'display:none'}">${status?(status.correct?'✓ 正确✔':'✗ 错误❌'):''}</span></div>
            <div class="truefalse-group"><label class="option"><input type="radio" name="tf_${q.id}" value="true" ${saved==='true'?'checked':''}> ✔ 正确</label><label class="option"><input type="radio" name="tf_${q.id}" value="false" ${saved==='false'?'checked':''}> ✘ 错误</label></div>
            <button class="submit-question-btn" data-qid="${q.id}" data-type="tf">📝 提交本题</button></div>`;
        });
        html += `</div>`;
        container.innerHTML = html;
        attachQuizEvents();
    }
    function attachQuizEvents() {
        document.querySelectorAll('input[type="radio"]').forEach(r=>r.addEventListener('change',handleRadioChange));
        document.querySelectorAll('input[type="checkbox"]').forEach(c=>c.addEventListener('change',handleCheckboxChange));
        document.querySelectorAll('.submit-question-btn').forEach(btn=>btn.addEventListener('click',handleSubmit));
    }
    function handleRadioChange(e){
        const name=e.target.name;
        let qid=name.startsWith("single_")?name.replace("single_",""):name.startsWith("tf_")?name.replace("tf_",""):null;
        if(qid) userAnswers[qid]=name.startsWith("tf_")?e.target.value:parseInt(e.target.value);
        updateScore();
    }
    function handleCheckboxChange(e){
        const name=e.target.name;
        if(!name.startsWith("multi_")) return;
        const qid=name.replace("multi_","");
        const checked=Array.from(document.querySelectorAll(`input[name="multi_${qid}"]:checked`)).map(cb=>parseInt(cb.value));
        userAnswers[qid]=checked;
        updateScore();
    }
    function handleSubmit(e){
        const qid=e.currentTarget.getAttribute('data-qid');
        const q=allQuizQuestions.find(qq=>qq.id===qid);
        if(!q) return;
        const selected=userAnswers[qid];
        if(selected===undefined){alert('请先选择答案');return;}
        const isCorrect=checkAnswer(q,selected);
        questionStatus[qid]={correct:isCorrect,submitted:true};
        const statusSpan=document.getElementById(`status-${qid}`);
        if(statusSpan){
            statusSpan.style.display='inline-flex';
            statusSpan.innerHTML=isCorrect?'✓ 正确✔':'✗ 错误❌';
            statusSpan.className=isCorrect?'answer-status-icon status-correct':'answer-status-icon status-wrong';
        }
        updateScore();
        e.currentTarget.closest('.question-item')?.classList.add(isCorrect?'correct-flash':'wrong-flash');
        setTimeout(()=>e.currentTarget.closest('.question-item')?.classList.remove('correct-flash','wrong-flash'),300);
    }
    function computeTotal(){let t=0;allQuizQuestions.forEach(q=>{const ans=userAnswers[q.id];if(ans!==undefined&&checkAnswer(q,ans)) t+=q.type==='multi'?2:1;});return t;}
    function updateScore(){document.getElementById("inlineScore").innerText=computeTotal();}
    function resetQuiz(){userAnswers={};questionStatus={};renderQuiz();document.getElementById("inlineResultMsg").style.display='none';updateScore();}
    function submitAll(){const score=computeTotal();const totalMax=allQuizQuestions.reduce((s,q)=>s+(q.type==='multi'?2:1),0);const msg=document.getElementById("inlineResultMsg");msg.style.display='block';msg.innerHTML=`✅ 测试得分：<strong style="font-size:1.3rem;">${score}</strong> / ${totalMax} 分。<br>“以人民为中心”是具体的、实践的，愿您知行合一！`;}
    document.getElementById("inlineSubmitBtn")?.addEventListener("click",submitAll);
    document.getElementById("inlineResetBtn")?.addEventListener("click",resetQuiz);
    renderQuiz();
</script>
</body>
</html>
